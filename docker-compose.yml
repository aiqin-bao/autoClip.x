services:
  autoclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoclip-x
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_DASHSCOPE_API_KEY=${API_DASHSCOPE_API_KEY}
      - API_MODEL_NAME=${API_MODEL_NAME:-qwen-long}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: autoclip-x-network
